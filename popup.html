<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hebrew RTL Helper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="brand">
        <img class="brand-mark" src="icons/icon.png" alt="">
        <div class="brand-copy">
          <h1>Hebrew RTL Helper</h1>
          <p>עברית נוחה יותר באתרים שתבחרו</p>
        </div>
      </header>

      <section class="controls" aria-label="הגדרות">
        <label class="toggle primary">
          <span class="toggle-copy">
            <span class="title">הפעל באתר הזה</span>
            <span class="hint">נשמר לאתר הזה גם לפעמים הבאות</span>
          </span>
          <input id="enabled" type="checkbox">
        </label>

        <label class="toggle">
          <span class="toggle-copy">
            <span class="title">יישור עברית</span>
            <span class="hint">מצמיד טקסט עברי לימין</span>
          </span>
          <input id="direction" type="checkbox">
        </label>

        <label class="toggle">
          <span class="toggle-copy">
            <span class="title">Markdown וקוד</span>
            <span class="hint">משאיר קוד קצר קריא בתוך עברית</span>
          </span>
          <input id="markdown" type="checkbox">
        </label>

        <label class="toggle">
          <span class="toggle-copy">
            <span class="title">גופן נוח</span>
            <span class="hint">משתמש בגופני מערכת נקיים</span>
          </span>
          <input id="font" type="checkbox">
        </label>

        <label class="toggle">
          <span class="toggle-copy">
            <span class="title">קריאות</span>
            <span class="hint">מרווח שורות ורשימות</span>
          </span>
          <input id="spacing" type="checkbox">
        </label>
      </section>

      <footer class="footer">
        <button id="apply" class="apply" type="button">החל עכשיו בדף</button>
        <p id="status" class="status" role="status" aria-live="polite"></p>
        <p class="credit">
          Made with care by
          <a href="https://github.com/TsofnatMaman" target="_blank" rel="noopener noreferrer">Tsofnat Maman</a>
          -
          <a href="https://github.com/TsofnatMaman/hebrew-rtl-helper" target="_blank" rel="noopener noreferrer">TsofnatMaman/hebrew-rtl-helper</a>
        </p>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
